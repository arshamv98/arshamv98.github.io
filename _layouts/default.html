<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | default: site.title | default: "Portfolio" }}</title>

    <!-- Open Graph Meta Tags (for LinkedIn, Facebook, etc.) -->
    <meta property="og:title" content="{{ page.title | default: site.title | default: 'Your Name - Portfolio' }}">
    <meta property="og:description" content="{{ page.description | default: site.description | default: 'Personal Portfolio' }}">
    <meta property="og:image" content="https://arshamv98.github.io/posts/thumbnail.png">
    <meta property="og:url" content="{{ site.url }}{{ page.url | relative_url }}">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="{{ site.title | default: 'Portfolio' }}">

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ page.title | default: site.title }}">
    <meta name="twitter:description" content="{{ page.description | default: site.description }}">
    <meta name="twitter:image" content="https://YOUR-USERNAME.github.io/img/preview.jpg">

    <!-- Your existing styles and other meta tags can go here -->
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
    {{ content }}
</body>
</html>
