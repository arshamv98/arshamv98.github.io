<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Let the remote theme handle the rest of the head (CSS, etc.) -->
    {{ content | markdownify | strip_html | truncatewords: 50 }}

    <!-- Open Graph Meta Tags for LinkedIn -->
    <meta property="og:title" content="{{ page.title | default: site.title | default: 'Arsham Vashisth' }}">
    <meta property="og:description" content="{{ page.description | default: site.description }}">
    <meta property="og:image" content="https://arshamv98.github.io/posts/thumbnail.png">
    <meta property="og:url" content="{{ site.url }}{{ page.url | relative_url }}">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Arsham Vashisth">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://arshamv98.github.io/posts/thumbnail.png">
</head>
<body>
    {{ content }}
</body>
</html>
