# ----------------------------------------
# ARSHAM VASHISTH — PORTFOLIO CONFIG
# ----------------------------------------

theme:
title: Arsham Vashisth
description: "A data enthusiast with a strong interest in Machine Learning and analytics. I enjoy using data to solve real world problems and support better decision making. This portfolio showcases a selection of my projects, each focused on creating practical and meaningful impact."
baseurl: ""
url: "https://arshamv98.github.io"

# ----------------------------------------
# About / Profile
# ----------------------------------------
subtitle: "Data Science Portfolio"
location: "Melbourne, AU"
resume_url: /docs/My_Resume.pdf
avatar_image: /img/pfolio img.png

# ----------------------------------------
# Contact Links
# ----------------------------------------
linkedln: "https://www.linkedin.com/in/arsham-vashisth/"
github:   "https://github.com/arshamv98"

# ----------------------------------------
# Open Graph
# ----------------------------------------
og_image: /img/thumbnail.png

# ----------------------------------------
# Plugins
# ----------------------------------------
plugins:
  - jekyll-paginate
  - jekyll-sitemap

# ----------------------------------------
# Pagination
# ----------------------------------------
paginate: 6
paginate_path: "/page/:num"

# ----------------------------------------
# Sass
# ----------------------------------------
sass:
  sass_dir: _sass
  style: compressed

# ----------------------------------------
# Post defaults
# ----------------------------------------
defaults:
  - scope:
      type: posts
    values:
      layout: post
      read_time: true
      share: false

# ----------------------------------------
# Exclude from build
# ----------------------------------------
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
