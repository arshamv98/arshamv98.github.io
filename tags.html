---
layout: default
title: Tags
---

<div class="site-wrapper">
  <section class="section">
    <div class="section-header">
      <span class="section-num">— </span>
      <h2 class="section-title">Tags</h2>
    </div>

    <div class="tags-wrap">
      {% for tag in site.tags %}
        <div class="tag-group" id="{{ tag[0] | slugify }}">
          <div class="tag-heading">
            <span class="project-type">{{ tag[0] }}</span>
            <span class="tag-count">{{ tag[1].size }} post{% if tag[1].size != 1 %}s{% endif %}</span>
          </div>
          <div class="tag-posts">
            {% for post in tag[1] %}
              <a href="{{ post.url | relative_url }}" class="tag-post-link">
                <span class="tag-post-title">{{ post.title }}</span>
                <span class="tag-post-date">{{ post.date | date: "%b %Y" }}</span>
              </a>
            {% endfor %}
          </div>
        </div>
      {% endfor %}
    </div>
  </section>
</div>

<style>
.tags-wrap { display: flex; flex-direction: column; gap: 2rem; }
.tag-group { border: 1px solid var(--border); }
.tag-heading {
  display: flex; align-items: center; gap: 1rem;
  padding: 0.75rem 1.25rem;
  border-bottom: 1px solid var(--border);
  background: var(--paper2);
}
.tag-count {
  font-family: var(--mono); font-size: 11px;
  color: var(--muted); letter-spacing: 0.06em;
}
.tag-posts { display: flex; flex-direction: column; }
.tag-post-link {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.75rem 1.25rem;
  border-bottom: 1px solid var(--border);
  transition: background 0.2s; color: inherit;
}
.tag-post-link:last-child { border-bottom: none; }
.tag-post-link:hover { background: var(--paper2); }
.tag-post-title { font-size: 14px; color: var(--ink); }
.tag-post-date {
  font-family: var(--mono); font-size: 11px;
  color: var(--muted); letter-spacing: 0.06em; flex-shrink: 0;
}
</style>
